<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tank Battle Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      /* Scaling is handled via ctx.setTransform each frame;
         the canvas element itself is centered by flexbox on the body */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #error-msg {
      display: none;
      color: #ff4444;
      font-family: monospace;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
      background: #2a0000;
      border: 2px solid #ff4444;
      border-radius: 8px;
      max-width: 480px;
    }

    #back-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.6);
      color: #cccccc;
      border: 1px solid #666;
      border-radius: 6px;
      padding: 8px 16px;
      font-family: monospace;
      font-size: 14px;
      cursor: pointer;
      display: none;
    }
    #back-btn:hover {
      background: rgba(60, 60, 60, 0.8);
      color: #ffffff;
      border-color: #aaa;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1200" height="800"></canvas>
  <button id="back-btn">← Back</button>
  <div id="error-msg">
    Your browser does not support HTML5 Canvas.<br />
    Please use a modern browser such as Chrome, Firefox, or Edge.
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
